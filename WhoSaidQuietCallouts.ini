; =======================================================================
; WHO SAID QUIET CALLOUTS - CONFIGURATION FILE
; Version: 0.9.1 Alpha (Maintenance & Documentation Cleanup Build)
; Date: March 7, 2026
; -----------------------------------------------------------------------
; This file controls global plugin settings, integrations, and callout behavior.
; Comments (lines starting with ';') are ignored by the plugin.
; =======================================================================


[General]
; Enables or disables log file creation.
; true  = write logs to Plugins/LSPDFR/Logs/WhoSaidQuietCallouts.txt
; false = disable file logging completely.
EnableLogging=true

; Sets the level of verbosity for log output.
; 0 = Normal          -> basic info only
; 1 = Intermediate    -> adds scene status & warnings
; 2 = Advanced        -> includes integration and AI behavior info
; 3 = Full Debug      -> full trace output
LogLevel=1

; Randomized delay range (in seconds) between callouts.
; WSQ waits a random time within this range before dispatching the next call.
MinCalloutCooldownSeconds=30
MaxCalloutCooldownSeconds=300


[Integrations]
; ================================================================
; Integration toggles - all are disabled by default.
; When WSQ detects one of these plugins running, it will notify you
; that integration support is available and can be enabled here.
;
; ⚠ WARNING: Policing Redefined conflicts with StopThePed and
;    UltimateBackup. DO NOT enable them together.
; ================================================================

StopThePed=false
CompuLite=false
GrammarPolice=false
CalloutInterface=false
UltimateBackup=false
LSPDFRExpanded=false
PolicingRedefined=false
ReportsPlus=false
ExternalPoliceComputer=false


[Callouts]
; ================================================================
; Individual callout toggles.
; true  = enable that specific callout
; false = disable it (won’t load/dispatch)
; All future callouts will be added here by default.
; ================================================================

ArmedRobbery=true
PursuitSuspect=true
DomesticDisturbance=true
SuspiciousVehicle=true
Kidnapping=true
GangShootout=true
Burglary=true
AnimalAttack=true
PublicIntoxication=true
StolenVehicle=true
OfficerDown=true
RoadRage=true
BarricadedSuspects=true
SpeedingVehicle=true
MissingPerson=true
DrugDeal=true
VIPEscort=true
TrafficStopAssist=true
WelfareCheck=true
StolenPoliceVehicle=true


[SuicideCallout]
; SuicideAttempt callout has its own configuration section.
; This callout contains sensitive scenarios involving negotiation,
; persuasion, and medical response simulation.
; ⚠ It is disabled by default for player comfort.
; Set SuicideAttempt=true to enable this feature at your discretion.

SuicideAttempt=false

; Adds a 2–5 minute response timer before escalation.
; Forced false if SuicideAttempt=false.
EnableResponseTimer=true

; Enables hidden 1‑minute EMS timer; affects survival probability.
; Forced false automatically if SuicideAttempt=false (cannot operate independently).
EnableHiddenEMSTimer=true

; Shows post‑callout suicide‑prevention helpline overlay.
; Forced false automatically if SuicideAttempt=false (only appears after call resolution).
EnableHelplineOverlay=true
